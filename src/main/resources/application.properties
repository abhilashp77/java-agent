# Spring Boot Configuration
spring.application.name=java-agent

# Microsoft SQL Server Configuration (uncomment for production)
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=your_db;user=your_user;password=your_password;trustServerCertificate=true
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# H2 In-Memory Database (for development/testing - remove when using SQL Server)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver

# LangChain4j OpenAI Configuration
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY:demo}
langchain4j.open-ai.chat-model.model-name=gpt-4o
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# Server Configuration
server.port=8080
